name: Job Apply Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Restore Sessions
        uses: actions/download-artifact@v4
        with:
          name: sessions
          path: sessions
        continue-on-error: true

      - name: Restore Logs
        uses: actions/download-artifact@v4
        with:
          name: logs
          path: logs
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Create Required Directories
        run: |
          mkdir -p sessions
          mkdir -p logs
          mkdir -p data
          mkdir -p resumes

      - name: Run Bot
        env:
          REMOTE_ONLY: "true"
          CHECK_INTERVAL_MINUTES: "60"
          JOB_POST_MAX_AGE_HOURS: "24"
          MAX_REQUIRED_YEARS: "3"
          OLLAMA_MODEL: "llama3:latest"

          PROFILE_NAME: ${{ secrets.PROFILE_NAME }}
          PROFILE_EMAIL: ${{ secrets.PROFILE_EMAIL }}
          PROFILE_PHONE: ${{ secrets.PROFILE_PHONE }}
          PROFILE_LOCATION: ${{ secrets.PROFILE_LOCATION }}
          PROFILE_LINKEDIN: ${{ secrets.PROFILE_LINKEDIN }}
          PROFILE_GITHUB: ${{ secrets.PROFILE_GITHUB }}
          PROFILE_EXPERIENCE: ${{ secrets.PROFILE_EXPERIENCE }}
          PROFILE_NOTICE_PERIOD: ${{ secrets.PROFILE_NOTICE_PERIOD }}
          PROFILE_CURRENT_CTC: ${{ secrets.PROFILE_CURRENT_CTC }}
          PROFILE_EXPECTED_CTC: ${{ secrets.PROFILE_EXPECTED_CTC }}
        run: python -m job_apply_bot.main


      - name: Save Sessions
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sessions
          path: sessions/
          retention-days: 7

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          retention-days: 7

      - name: Upload Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data
          path: data/
          retention-days: 7

