name: Job Apply Bot

on:
  schedule:
    - cron: '0 * * * *' # every 1 hour
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps

      - name: Run bot
        env:
          OLLAMA_MODEL: ${{ secrets.OLLAMA_MODEL || 'llama3:latest' }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL || 'http://localhost:11434' }}
          REMOTE_ONLY: ${{ secrets.REMOTE_ONLY || 'true' }}
          CHECK_INTERVAL_MINUTES: ${{ secrets.CHECK_INTERVAL_MINUTES || '60' }}
          JOB_POST_MAX_AGE_HOURS: ${{ secrets.JOB_POST_MAX_AGE_HOURS || '24' }}
        run: |
          python -m job_apply_bot.main

